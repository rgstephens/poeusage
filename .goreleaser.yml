version: 2

project_name: poeusage

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/gstephens/poeusage/cmd.Version={{.Version}}
      - -X github.com/gstephens/poeusage/cmd.BuildDate={{.Date}}
    binary: poeusage

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: poeusage
    repository:
      owner: rgstephens
      name: homebrew-poeusage
      token: "{{ .Env.HOMEBREW_RELEASE_TOKEN }}"
    homepage: "https://github.com/rgstephens/poeusage"
    description: "Monitor your Poe API point balance and usage history"
    install: |
      bin.install "poeusage"
    test: |
      system "#{bin}/poeusage", "--version"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
